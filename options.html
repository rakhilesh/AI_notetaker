<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glass AI Note Taker - Settings</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
    }
    .settings-container {
      width: 400px;
      padding: 30px;
    }
  </style>
</head>
<body>
  <div class="settings-container glass-panel">
    <h1>Settings</h1>
    <div style="margin-top: 20px;">
      <label style="display: block; margin-bottom: 8px; font-size: 13px; color: var(--text-secondary);">OpenAI API Key</label>
      <input type="password" id="api-key-input" class="glass-input" placeholder="sk-...">
      <p style="font-size: 11px; color: var(--text-secondary); margin-top: 10px;">
        Your API key is stored locally and used only to communicate with OpenAI.
      </p>
      <button id="save-settings" class="glass-button" style="margin-top: 20px; width: 100%;">Save Settings</button>
    </div>
  </div>
  <script src="js/main.js"></script>
</body>
</html>
